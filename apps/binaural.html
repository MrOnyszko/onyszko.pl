<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binaural</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
        font-family: 'Inter', sans-serif;
    }
    /* Custom smooth transition for all properties */
    .smooth-transition {
        transition: all 0.3s ease-in-out;
    }
  </style>
</head>
<body class="bg-gray-900 text-white antialiased">

<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md mx-auto space-y-8">

    <!-- Header -->
    <header class="text-center">
      <h1 class="text-4xl font-bold tracking-tighter">Binaural</h1>
      <p id="status-display" class="text-gray-400 mt-2 h-6 smooth-transition">Select a frequency to begin</p>
    </header>

    <!-- Beat Selection -->
    <div id="beat-selector" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Beat options will be injected here by JavaScript -->
    </div>

    <!-- Main Player Controls -->
    <div class="flex justify-center">
      <button id="play-pause-btn" class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-600 disabled:cursor-not-allowed text-white rounded-full w-20 h-20 flex items-center justify-center shadow-lg smooth-transition" disabled>
        <!-- Play/Pause SVG Icon -->
        <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-play">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-pause hidden">
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
  const BRAINWAVE_FREQUENCIES = {
      delta: {
          range: "0.5 - 4 Hz",
          beat_freq: 2.5,
          description: "Deep sleep, healing",
      },
      theta: {
          range: "4 - 8 Hz",
          beat_freq: 6,
          description: "Meditation, creativity",
      },
      alpha: {
          range: "8 - 13 Hz",
          beat_freq: 10,
          description: "Relaxed focus, learning",
      },
      beta: {
          range: "13 - 30 Hz",
          beat_freq: 20,
          description: "Active thinking, focus",
      },
      gamma: {
          range: "30 - 100 Hz",
          beat_freq: 40,
          description: "High-level cognition",
      }
  };

  // --- Audio Generation State ---
  let audioContext = null;
  let leftOscillator = null;
  let rightOscillator = null;
  let merger = null;
  let isPlaying = false;
  let currentBeat = null;

  const CARRIER_FREQ = 220; // A pleasant base frequency in Hz (A3 note)
  const VOLUME = 0.3; // Volume (0.0 to 1.0)

  // --- UI Elements ---
  const beatSelector = document.getElementById('beat-selector');
  const playPauseBtn = document.getElementById('play-pause-btn');
  const playIcon = document.getElementById('play-icon');
  const pauseIcon = document.getElementById('pause-icon');
  const statusDisplay = document.getElementById('status-display');

  // --- Functions ---

  /**
   * Initializes the audio context and oscillators
   */
  function initAudio() {
      if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
           audioContext.resume();
      }

      leftOscillator = audioContext.createOscillator();
      rightOscillator = audioContext.createOscillator();

      // Create a stereo output
      merger = audioContext.createChannelMerger(2);

      const gainNode = audioContext.createGain();
      gainNode.gain.setValueAtTime(VOLUME, audioContext.currentTime);

      // Connect nodes
      leftOscillator.connect(merger, 0, 0); // Connect to left channel
      rightOscillator.connect(merger, 0, 1); // Connect to right channel
      merger.connect(gainNode);
      gainNode.connect(audioContext.destination);
  }

  /**
   * Plays the selected binaural beat
   */
  function play() {
      if (!currentBeat) return;

      initAudio();

      const beatInfo = BRAINWAVE_FREQUENCIES[currentBeat];
      const beatFreq = beatInfo.beat_freq;

      leftOscillator.frequency.setValueAtTime(CARRIER_FREQ - beatFreq / 2.0, audioContext.currentTime);
      rightOscillator.frequency.setValueAtTime(CARRIER_FREQ + beatFreq / 2.0, audioContext.currentTime);

      leftOscillator.start(0);
      rightOscillator.start(0);

      isPlaying = true;
      updateUI();
  }

  /**
   * Pauses the binaural beat
   */
  function pause() {
      if (leftOscillator && rightOscillator) {
          leftOscillator.stop(0);
          rightOscillator.stop(0);
          // It's good practice to disconnect to free up resources
          leftOscillator.disconnect();
          rightOscillator.disconnect();
          merger.disconnect();
      }
       if (audioContext) {
          // Closing and nullifying context ensures a fresh start next time
          audioContext.close().then(() => {
              audioContext = null;
          });
      }
      isPlaying = false;
      updateUI();
  }

  /**
   * Handles the selection of a beat type
   * @param {string} beatKey - The key of the selected beat (e.g., 'alpha')
   */
  function selectBeat(beatKey) {
      const wasPlaying = isPlaying;
      if (isPlaying) {
          pause();
      }
      currentBeat = beatKey;

      // Re-enable play button
      playPauseBtn.disabled = false;

      // If it was playing a different tone, start the new one immediately
      if(wasPlaying) {
           // A small delay to allow the audio context to properly close before reopening
          setTimeout(play, 50);
      }
      updateUI();
  }

  /**
   * Updates the UI based on the current state (playing, paused, selection)
   */
  function updateUI() {
      // Update Play/Pause button
      if (isPlaying) {
          playIcon.classList.add('hidden');
          pauseIcon.classList.remove('hidden');
          playPauseBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-500');
          playPauseBtn.classList.add('bg-pink-600', 'hover:bg-pink-500');
      } else {
          playIcon.classList.remove('hidden');
          pauseIcon.classList.add('hidden');
          playPauseBtn.classList.remove('bg-pink-600', 'hover:bg-pink-500');
          playPauseBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-500');
      }

      // Update status display
      if (isPlaying) {
           statusDisplay.textContent = `Playing ${currentBeat.charAt(0).toUpperCase() + currentBeat.slice(1)} (${BRAINWAVE_FREQUENCIES[currentBeat].beat_freq} Hz)`;
      } else if (currentBeat) {
           statusDisplay.textContent = `Paused. Press play to resume ${currentBeat}.`;
      } else {
           statusDisplay.textContent = 'Select a frequency to begin';
      }

      // Update selector buttons
      document.querySelectorAll('.beat-btn').forEach(btn => {
          if (btn.dataset.beat === currentBeat) {
              btn.classList.remove('bg-gray-800', 'hover:bg-gray-700');
              btn.classList.add('bg-indigo-600', 'ring-2', 'ring-white');
          } else {
              btn.classList.remove('bg-indigo-600', 'ring-2', 'ring-white');
              btn.classList.add('bg-gray-800', 'hover:bg-gray-700');
          }
      });
  }

  /**
   * Injects the beat selection buttons into the DOM
   */
  function populateSelector() {
      for (const key in BRAINWAVE_FREQUENCIES) {
          const beat = BRAINWAVE_FREQUENCIES[key];
          const btn = document.createElement('button');
          btn.className = 'beat-btn bg-gray-800 hover:bg-gray-700 p-4 rounded-lg text-left smooth-transition';
          btn.dataset.beat = key;
          btn.innerHTML = `
              <p class="font-bold text-lg">${key.charAt(0).toUpperCase() + key.slice(1)}</p>
              <p class="text-sm text-gray-400">${beat.description}</p>
              <p class="text-xs text-indigo-400 mt-1">${beat.range}</p>
          `;
          btn.addEventListener('click', () => selectBeat(key));
          beatSelector.appendChild(btn);
      }
  }

  // --- Event Listeners ---
  playPauseBtn.addEventListener('click', () => {
       // Resume context on user gesture if needed
      if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
      }

      if (isPlaying) {
          pause();
      } else {
          play();
      }
  });

  // --- Initial Setup ---
  document.addEventListener('DOMContentLoaded', () => {
      populateSelector();
      updateUI();
  });

</script>
</body>
</html>
