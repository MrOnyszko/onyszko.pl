<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <style>
    /* Custom animation for a smoother pulse */
    @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(129, 140, 248, 0.2); }
        50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(129, 140, 248, 0.4); }
    }
    .animate-pulse-slow {
        animation: pulse 4s ease-in-out infinite;
    }
    /* Simple fade-in animation */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
        animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-900 text-slate-200 flex flex-col items-center justify-center min-h-screen font-sans p-4 select-none">

<div id="app" class="w-full max-w-md mx-auto text-center">

  <!-- Header -->
  <header class="mb-8 flex justify-between items-center">
    <h1 class="text-4xl font-bold text-indigo-400">Breathe</h1>
    <div class="flex items-center space-x-4">
      <!-- Mute Button -->
      <button id="mute-btn" class="text-slate-400 hover:text-white transition-colors">
        <svg id="icon-unmuted" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg id="icon-muted" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>
      <!-- Settings Button -->
      <button id="settings-btn" class="text-slate-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Screen -->
  <main id="main-screen" class="space-y-12">
    <div id="visualizer" class="relative w-48 h-48 mx-auto flex items-center justify-center bg-gray-800 rounded-full shadow-lg transition-transform duration-1000">
      <div id="circle" class="w-full h-full bg-indigo-500 rounded-full transition-transform duration-1000 ease-in-out"></div>
      <div id="status-text" class="absolute text-2xl font-semibold text-white">Ready?</div>
      <div id="counter" class="absolute bottom-4 text-slate-400 text-sm"></div>
    </div>

    <div id="controls" class="h-12 pt-10">
      <button id="start-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all">
        Start Session
      </button>
    </div>

    <div id="timer-display" class="hidden text-6xl font-mono">00:00</div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-gray-800 p-6 rounded-lg w-full max-w-sm space-y-4 fade-in">
      <h2 class="text-xl font-bold text-indigo-400">Session Settings</h2>
      <div class="text-left space-y-4">
        <div>
          <label for="rounds-input" class="block mb-1 text-sm font-medium text-slate-300">Rounds</label>
          <input type="number" id="rounds-input" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" value="3" min="1" max="10">
        </div>
        <div>
          <label for="breaths-input" class="block mb-1 text-sm font-medium text-slate-300">Breaths per Round</label>
          <input type="number" id="breaths-input" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" value="30" min="10" max="50">
        </div>
        <div>
          <label for="recovery-input" class="block mb-1 text-sm font-medium text-slate-300">Recovery Hold
                                                                                            (seconds)</label>
          <input type="number" id="recovery-input" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5" value="15" min="5" max="30">
        </div>
        <div>
          <label for="speed-input" class="block mb-1 text-sm font-medium text-slate-300">Breathing Speed
                                                                                         (<span id="speed-value">1.5</span>s
                                                                                         per phase)</label>
          <input type="range" id="speed-input" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer" value="1.5" min="1" max="3" step="0.1">
        </div>
      </div>
      <button id="save-settings-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">
        Save & Close
      </button>
    </div>
  </div>
</div>

<script>
  // --- UI Elements ---
  const controls = document.getElementById('controls');
  const circle = document.getElementById('circle');
  const statusText = document.getElementById('status-text');
  const counter = document.getElementById('counter');
  const timerDisplay = document.getElementById('timer-display');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsModal = document.getElementById('settings-modal');
  const saveSettingsBtn = document.getElementById('save-settings-btn');
  const muteBtn = document.getElementById('mute-btn');
  const iconMuted = document.getElementById('icon-muted');
  const iconUnmuted = document.getElementById('icon-unmuted');

  // --- State ---
  let state = 'idle'; // idle, breathing, hold, recovery
  let breathCount = 0;
  let roundCount = 1;
  let timerInterval;
  let breathLoopTimeout;
  let recoveryTimeout;
  let currentStopTimerFn = null;

  // --- Settings ---
  let settings = { rounds: 3, breaths: 30, recoveryTime: 15, breathingSpeed: 1.5 };
  const roundsInput = document.getElementById('rounds-input');
  const breathsInput = document.getElementById('breaths-input');
  const recoveryInput = document.getElementById('recovery-input');
  const speedInput = document.getElementById('speed-input');
  const speedValueDisplay = document.getElementById('speed-value');

  // --- Audio ---
  let isMuted = false;
  let isAudioReady = false;
  let breathSynth, gongSynth;

  // --- Audio Functions ---
  function initAudio() {
      if (isAudioReady) return;
      Tone.start();
      breathSynth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.5 } }).toDestination();
      gongSynth = new Tone.MembraneSynth({
          pitchDecay: 0.01,
          octaves: 10,
          oscillator: { type: 'sine' },
          envelope: {
              attack: 0.001,
              decay: 0.8,
              sustain: 0.01,
              release: 1.4,
              attackCurve: 'exponential'
          }
      }).toDestination();
      isAudioReady = true;
  }
  const playSound = (synth, note, duration) => !isMuted && synth.triggerAttackRelease(note, duration);
  const playInSound = () => playSound(breathSynth, 'C4', '0.5');
  const playOutSound = () => playSound(breathSynth, 'G3', '0.5');
  const playGong = () => playSound(gongSynth, 'C5', '1');

  // --- Settings Functions ---
  function loadSettingsFromStorage() {
      const savedSettings = localStorage.getItem('breatheSettings');
      const savedMute = localStorage.getItem('breatheMute');
      if (savedSettings) settings = JSON.parse(savedSettings);
      // Ensure breathingSpeed exists for users with old settings
      if (!settings.breathingSpeed) {
          settings.breathingSpeed = 1.5;
      }
      isMuted = savedMute === 'true';
      updateSettingsUI();
      updateMuteIcon();
  }
  function saveSettingsToStorage() {
      localStorage.setItem('breatheSettings', JSON.stringify(settings));
  }
  function updateSettingsUI() {
      roundsInput.value = settings.rounds;
      breathsInput.value = settings.breaths;
      recoveryInput.value = settings.recoveryTime;
      speedInput.value = settings.breathingSpeed;
      speedValueDisplay.textContent = parseFloat(speedInput.value).toFixed(1);
  }
  function saveSettings() {
      settings.rounds = parseInt(roundsInput.value) || 3;
      settings.breaths = parseInt(breathsInput.value) || 30;
      settings.recoveryTime = parseInt(recoveryInput.value) || 15;
      settings.breathingSpeed = parseFloat(speedInput.value) || 1.5;
      saveSettingsToStorage();
      settingsModal.classList.add('hidden');
  }

  // --- UI & State Logic ---
  function updateUI(text, countText = '', circleScale = 1) {
      statusText.textContent = text;
      counter.textContent = countText;
      circle.style.transform = `scale(${circleScale})`;
  }

  function renderControls() {
      controls.innerHTML = '';
      let button;
      switch(state) {
          case 'breathing':
              button = document.createElement('button');
              button.textContent = 'Start Hold';
              button.className = 'w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all fade-in';
              button.onclick = () => {
                  clearTimeout(breathLoopTimeout);
                  startHold();
              };
              break;
          case 'hold':
              button = document.createElement('button');
              button.textContent = 'Stop Hold & Breathe In';
              button.className = 'w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all fade-in';
              button.onclick = () => {
                  if (typeof currentStopTimerFn === 'function') {
                     currentStopTimerFn();
                  }
                  startRecovery();
              };
              break;
          case 'idle':
          default:
              button = document.createElement('button');
              button.textContent = 'Start Session';
              button.className = 'w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all';
              button.onclick = startSession;
              break;
      }
      if (button) controls.appendChild(button);
  }

  function runTimer() {
      let startTime = Date.now();
      timerDisplay.classList.remove('hidden');
      timerInterval = setInterval(() => {
          const elapsed = Date.now() - startTime;
          const totalSeconds = Math.floor(elapsed / 1000);
          const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
          const seconds = String(totalSeconds % 60).padStart(2, '0');
          timerDisplay.textContent = `${minutes}:${seconds}`;
      }, 100);
      return () => {
          clearInterval(timerInterval);
          timerDisplay.classList.add('hidden');
          return Date.now() - startTime;
      };
  }

  // --- Core Session Flow ---
  function interruptAndResetSession() {
      clearTimeout(breathLoopTimeout);
      clearTimeout(recoveryTimeout);
      clearInterval(timerInterval);

      state = 'idle';
      breathCount = 0;
      roundCount = 1;
      currentStopTimerFn = null;

      timerDisplay.classList.add('hidden');
      circle.parentElement.classList.remove('animate-pulse-slow');
      updateUI('Ready?');
      renderControls();
  }

  function startSession() {
      interruptAndResetSession(); // Reset before starting
      initAudio();
      circle.parentElement.classList.add('animate-pulse-slow');
      setTimeout(startBreathingCycle, 100);
  }

  function startBreathingCycle() {
      state = 'breathing';
      breathCount = 0;
      renderControls();
      const doBreath = () => {
          if (breathCount >= settings.breaths) {
              startHold();
              return;
          }
          breathCount++;
          updateUI('In', `Breath: ${breathCount}/${settings.breaths}`, 1.5);
          playInSound();
          breathLoopTimeout = setTimeout(() => {
              updateUI('Out', `Breath: ${breathCount}/${settings.breaths}`, 0.5);
              playOutSound();
              breathLoopTimeout = setTimeout(doBreath, settings.breathingSpeed * 1000);
          }, settings.breathingSpeed * 1000);
      };
      doBreath();
  }

  function startHold() {
      state = 'hold';
      playGong();
      updateUI('Hold', `Round ${roundCount}`, 1);
      renderControls();
      currentStopTimerFn = runTimer();
  }

  function startRecovery() {
      state = 'recovery';
      playGong();
      updateUI('Breathe In', `Hold for ${settings.recoveryTime}s`, 1.5);
      renderControls(); // This will clear the buttons
      recoveryTimeout = setTimeout(() => {
          // Recovery hold is finished. Now add a 3s delay before the next round.
          updateUI('', '', 1); // Clear text for the pause

          recoveryTimeout = setTimeout(() => {
              roundCount++;
              if (roundCount > settings.rounds) {
                  endSession();
              } else {
                  startBreathingCycle();
              }
          }, 3000); // 3-second delay
      }, settings.recoveryTime * 1000);
  }

  function endSession() {
      playGong();
      interruptAndResetSession();
      updateUI('Done!', 'Session Complete');
  }

  function updateMuteIcon() {
      iconMuted.classList.toggle('hidden', !isMuted);
      iconUnmuted.classList.toggle('hidden', isMuted);
  }

  // --- Event Listeners ---
  settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
  saveSettingsBtn.addEventListener('click', saveSettings);
  muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      localStorage.setItem('breatheMute', isMuted);
      updateMuteIcon();
  });
  speedInput.addEventListener('input', () => {
      speedValueDisplay.textContent = parseFloat(speedInput.value).toFixed(1);
  });

  // --- Initialization ---
  window.onload = () => {
      loadSettingsFromStorage();
      renderControls();
  };
</script>

</body>
</html>
